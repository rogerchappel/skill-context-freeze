name: CI

on:
  push:
    branches: [main, "rc-*", "release-candidate/**"]
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm run release:check
